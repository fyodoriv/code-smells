name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm provenance attestations (OIDC) — proves the package
  # was built from this exact commit in a GitHub-hosted runner.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          # Scope is unscoped package — registry-url alone is enough.

      - name: Install dependencies
        run: npm ci

      - name: Verify the bundled CLI is runnable
        run: |
          chmod +x ./bin/code-smells.mjs
          node ./bin/code-smells.mjs --help || true  # --help may exit non-zero on older code-pushup
          node -e "require('./package.json').bin['code-smells']"

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
