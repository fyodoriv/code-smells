name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Vitest + v8 coverage. Thresholds live in vitest.config.mjs
      # (95% statements/functions/lines, 90% branches). The run fails
      # if coverage drops below threshold — no separate check needed.
      - name: Run tests with coverage
        run: npm run test:coverage

      # Expose the JSON summary as a build artifact for inspection.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
